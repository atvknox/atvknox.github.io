<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>atvknox's home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; color: #ffffff; font-family: Arial, sans-serif; padding: 60px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 720px; animation: intro 0.8s ease-out; }
        h2 { font-family: monospace; font-size: 1.4rem; margin-top: 45px; margin-bottom: 15px; }
        ul { list-style: none; margin-top: 20px; }
        li { margin-bottom: 12px; font-family: monospace; font-size: 1.1rem; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .footer { margin-top: 60px; padding-top: 20px; border-top: 1px dashed #222222; font-size: 0.95rem; color: #555555; font-family: monospace; }
        @keyframes intro { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container"> 
        <h2>Welcome to my blog!</h2>
        
        <ul>

        </ul>

        <div class="footer">
        </div>
    </div>
</body>
</html>
